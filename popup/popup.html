<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Portal Prints - Latest</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Portal Prints</h1>
      <div class="badge">Preview Mode</div>
    </header>

    <main id="app">
      <!-- Content injected by popup.js -->
      <div id="loading" class="state">
        <div class="spinner"></div>
      </div>

      <div id="empty-state" class="state hidden">
        <div class="icon">📸</div>
        <p>No snapshots yet.</p>
        <span>Click the Capture button on any YouTube video to start.</span>
      </div>

      <div id="capture-display" class="hidden">
        <div class="image-wrapper">
          <img id="preview" src="" alt="Capture Preview">
        </div>
        <div class="details">
          <h2 id="title">Video Title</h2>
          <a id="url" href="#" target="_blank">YouTube Link</a>
        </div>
        <div class="meta">
          <span id="timestamp">Just now</span>
        </div>
      </div>
    </main>
    
    <footer>
      <p>Verification MVP &bull; Portal Prints</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
