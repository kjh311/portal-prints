<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Portal Prints</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Portal Prints</h1>
      <button id="sign-out-btn" class="hidden">Sign Out</button>
    </header>

    <main id="app">
      <!-- Auth Section -->
      <section id="auth-section" class="state hidden">
        <div class="icon">✨</div>
        <p>Elevate your capture game</p>
        
        <div class="auth-buttons">
          <button id="google-signin-btn" class="google-btn">
            <svg viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
              <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
            Sign in with Google
          </button>
        </div>

        <span class="hint">Authenticated users can sync high-quality frames across devices.</span>
      </section>

      <!-- Loading Section -->
      <section id="loading" class="state">
        <div class="spinner"></div>
      </section>

      <!-- Empty Section -->
      <section id="empty-state" class="state hidden">
        <div class="icon">📸</div>
        <p>No snapshots yet.</p>
        <span>Click the Capture button on any YouTube video to start.</span>
      </section>

      <!-- Capture Section -->
      <section id="capture-display" class="hidden">
        <div class="image-wrapper">
          <img id="preview" src="" alt="Capture Preview">
        </div>
        <div class="details">
          <h2 id="title">Video Title</h2>
          <a id="url" href="#" target="_blank">YouTube Link</a>
        </div>
        <div class="meta">
          <span id="timestamp">Just now</span>
        </div>
      </section>
    </main>
    
    <footer>
      <p>Cloud Synchronized &bull; Portal Prints</p>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
